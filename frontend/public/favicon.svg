<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#7c3aed" fill-opacity="0.15"/>
  <rect width="32" height="32" rx="8" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Bot head -->
  <rect x="8" y="10" width="16" height="13" rx="4" fill="#7c3aed"/>

  <!-- Eyes -->
  <circle cx="12.5" cy="16" r="2" fill="white"/>
  <circle cx="19.5" cy="16" r="2" fill="white"/>
  <circle cx="13"   cy="15.5" r="0.8" fill="#5b21b6"/>
  <circle cx="20"   cy="15.5" r="0.8" fill="#5b21b6"/>

  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="7" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="6" r="1.5" fill="#a78bfa"/>

  <!-- Mouth -->
  <rect x="12" y="20" width="8" height="1.5" rx="0.75" fill="white" fill-opacity="0.8"/>

  <!-- Ears -->
  <rect x="6"  y="14" width="2" height="4" rx="1" fill="#7c3aed"/>
  <rect x="24" y="14" width="2" height="4" rx="1" fill="#7c3aed"/>

  <!-- Document lines at bottom -->
  <rect x="9"  y="26" width="5" height="1.5" rx="0.75" fill="#a78bfa" fill-opacity="0.7"/>
  <rect x="15.5" y="26" width="7.5" height="1.5" rx="0.75" fill="#a78bfa" fill-opacity="0.4"/>
</svg>
