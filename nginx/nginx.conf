# ── Main Nginx reverse-proxy (gateway container) ─────────────────────────────
#
# Topology:
#   Client → nginx:80/443 → { frontend:80, backend:8000 }
#
# All /api/* and /health requests are proxied to the FastAPI backend.
# Everything else goes to the React SPA.

upstream frontend_upstream {
    server frontend:80;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

# Rate-limit zone: 30 req/min per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # Max upload size (match backend setting)
    client_max_body_size 55M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "strict-origin"          always;
    add_header X-XSS-Protection       "1; mode=block"          always;

    # ── API routes → FastAPI backend ────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE / streaming — disable buffering
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      300s;
        proxy_connect_timeout   10s;
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass       http://backend_upstream;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ── Docs (only in development — disabled in production) ─────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass       http://backend_upstream;
        proxy_set_header Host $host;
    }

    # ── Everything else → React SPA ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   Connection      "";
        proxy_read_timeout 30s;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
}
