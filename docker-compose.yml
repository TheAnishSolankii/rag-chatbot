version: "3.9"

# ════════════════════════════════════════════════════════════════════════════
#  RAG Chatbot — Docker Compose
#
#  Services:
#    nginx    → reverse proxy / gateway  (port 80)
#    backend  → FastAPI                  (internal :8000)
#    frontend → React SPA served by Nginx (internal :80)
#
#  Volumes:
#    rag_faiss   → persists FAISS vector index across restarts
#    rag_uploads → persists uploaded PDF files
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rag_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - rag_net

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_backend
    env_file:
      - ./backend/.env
    environment:
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - UPLOAD_DIR=/app/data/uploads
      - ALLOWED_ORIGINS=["http://localhost","http://localhost:80"]
    volumes:
      - rag_faiss:/app/data/faiss_index
      - rag_uploads:/app/data/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - rag_net

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: rag_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  rag_faiss:
    driver: local
  rag_uploads:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  rag_net:
    driver: bridge
